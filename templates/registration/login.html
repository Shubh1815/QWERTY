<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>qwerty</title>
    <link href="{% static "stylesheets/bootstrap.min.css" %}" rel="stylesheet" type="text/css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.0/font/bootstrap-icons.css">

    <link href="{% static "stylesheets/template.css" %}" rel="stylesheet" type="text/css">
    <link href="{% static "stylesheets/main.css" %}" rel="stylesheet" type="text/css">
    <link href="{% static "stylesheets/login.css" %}" rel="stylesheet" type="text/css">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <div>
                <a class="navbar-brand" href="">
                    <span class="red">QWE</span>RTY
                </a>
            </div>
        </div>
    </nav>
     <div class="login-dark">
        <form method="POST" action="{% url "login" %}">
            {% csrf_token %}
            <h2 class="visually-hidden">Login Form</h2>
            <div class="illustration"><i class="bi bi-shield-lock"></i></div>
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
            {% for field in form %}
                <div class="mb-2">
                    {{ field }}
                </div>
            {% endfor %}

            <div class="mb-3 d-grid">
                <button class="btn btn-primary" type="submit">Log In</button>
            </div>
            <a href="#" class="forgot">Forgot your email or password?</a>
        </form>
    </div>


    <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-JEW9xMcG8R+pH31jmWH6WWP0WintQrMb4s7ZOdauHnUtxwoG2vI5DkLtS3qm9Ekf"
            crossorigin="anonymous"
    ></script>
</body>
</html>
