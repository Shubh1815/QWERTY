<div class="row mt-3 ">
    <div class="col-md-8 mb-3">
        <div class="d-flex justify-content-start bg-dark shadow-sm mb-3 p-3">
            <div class="me-2">
                <input list="products" name="browser" id="product" placeholder="Product" class="form-control">
                <datalist id="products">
                </datalist>
            </div>
            <div class="mx-2">
                <input type="number" min="1" class="form-control" id="quantity" placeholder="Quantity">
            </div>
            <div class="mx-2">
                <button id="addProduct" data-target="#selectedProducts" class="btn btn-danger">Add</button>
            </div>
        </div>

        <div class="bg-dark shadow-sm p-3">
            <ul class="list-group" id="selectedProducts">
            </ul>

            <div class="d-flex justify-content-between align-items-center">
                        <span>
                            Total Amount: <span id="total-amount">0</span>
                        </span>
                <button class="btn btn-primary" id="buy">Buy!</button>
            </div>
        </div>
    </div>
    <div class="col-md-4 mb-3">
        <div class="p-3 bg-dark shadow-sm">
            <div class="mb-2">
                <span>Student balance: </span>
                <span id="balance">N/A</span>
            </div>

            <input type="text" id="enrollment-no" class="form-control" placeholder="Enrollment No.">

            <div class="mt-3" id="camera">

            </div>
            <div class="d-flex justify-content-end">
                <button id="scan" class="btn btn-outline-warning mx-1">Scan</button>
                <button id="stop-scan" class="btn btn-warning mx-1">Stop</button>
            </div>
        </div>
    </div>

</div>
